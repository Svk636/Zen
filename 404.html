<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>झेन जर्नल</title>
<script>
  // GitHub Pages SPA redirect: preserve path for SW navigation handling
  var l = window.location;
  l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1).join('/') + '/?p=' +
    l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
    (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash);
</script>
</head>
<body>
<p style="font-family:serif;text-align:center;padding:48px;color:#9a9488">पुनर्निर्देशित करत आहे…</p>
</body>
</html>
