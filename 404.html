<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>झेन जर्नल — पृष्ठ सापडले नाही</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="झेन जर्नल">
<meta name="theme-color" content="#f7f5f0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1814" media="(prefers-color-scheme: dark)">
<!--
  PWA deep-link redirect
  ──────────────────────
  When a user launches the installed PWA from their home screen with a saved
  URL that no longer exists (e.g. after a deploy that moved files), the browser
  lands here. We capture the attempted path, stash it in sessionStorage, then
  redirect to index.html — which can read it and restore state.

  This pattern is also used by GitHub Pages SPAs; it works on Netlify too
  (though Netlify's _redirects file handles most cases).
-->
<script>
  // Save the intended path so the app can handle it after redirect
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;
  if (path !== '/' && path !== '/index.html') {
    try {
      sessionStorage.setItem('zj_404_redirect', path + search + hash);
    } catch(e) {}
  }
  // Redirect after a short pause (lets the styled message appear briefly)
  setTimeout(function() {
    window.location.replace('/');
  }, 1800);
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #f7f5f0;
    --ink:   #1a1814;
    --muted: #9a9488;
    --faint: #c8c2b8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:    #1a1814;
      --ink:   #f0ede6;
      --muted: #8a8478;
      --faint: #3a3830;
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Palatino Linotype', Palatino, Georgia, serif;
    font-weight: 300;
  }

  .wrap {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    gap: 20px;
  }

  .glyph {
    font-size: 48px;
    color: var(--faint);
    line-height: 1;
    animation: breathe 3s ease-in-out infinite;
  }

  .label {
    font-family: 'SF Mono', ui-monospace, 'Cascadia Code', Menlo, monospace;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .heading {
    font-size: clamp(22px, 5vw, 30px);
    font-style: italic;
    color: var(--ink);
    font-weight: 300;
    line-height: 1.3;
  }

  .sub {
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
    max-width: 320px;
  }

  .back-link {
    display: inline-block;
    margin-top: 8px;
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--faint);
    padding: 10px 20px;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-link:hover { color: var(--ink); border-color: var(--muted); }

  .redirect-note {
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    color: var(--faint);
    margin-top: 4px;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.35; transform: scale(1);    }
    50%       { opacity: 0.65; transform: scale(1.06); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="glyph">○</div>
  <div class="label">झेन जर्नल · 404</div>
  <h1 class="heading">पृष्ठ सापडले नाही</h1>
  <p class="sub">हे पृष्ठ अस्तित्वात नाही किंवा हलवले गेले आहे.</p>
  <a href="/" class="back-link">← परत जा</a>
  <p class="redirect-note">स्वयं-पुनर्निर्देशित होत आहे…</p>
</div>
</body>
</html>
