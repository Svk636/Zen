# ═══════════════════════════════════════════════════════════════
#  netlify.toml — झेन जर्नल Netlify Build Config
#
#  What this does:
#    At deploy time, Netlify runs the build command below.
#    It reads your secret keys from Netlify Environment Variables
#    and writes them into config.js — which is then served to the browser.
#
#    config.js is NEVER stored in git. It only exists on Netlify's servers.
#
#  Setup (one time):
#    Netlify Dashboard → Your Site → Site configuration
#    → Environment variables → Add these variables:
#
#      ZJ_PROVIDER          groq                          (or gemini/openai/claude)
#      ZJ_GROQ_KEY          gsk_xxxx...                   (from console.groq.com)
#      ZJ_GROQ_MODEL        qwen/qwen3-32b                (recommended free model)
#      ZJ_GEMINI_KEY        AIzaS...                      (from aistudio.google.com)
#      ZJ_GEMINI_MODEL      gemini-1.5-flash
#      ZJ_OPENAI_KEY        sk-proj-...                   (from platform.openai.com)
#      ZJ_OPENAI_MODEL      gpt-4o-mini
#      ZJ_CLAUDE_KEY        sk-ant-...                    (from console.anthropic.com)
#      ZJ_CLAUDE_MODEL      claude-haiku-4-5-20251001
#      ZJ_SUPABASE_URL      https://xxxx.supabase.co      (Supabase Project URL)
#      ZJ_SUPABASE_ANON_KEY eyJxxx...                     (Supabase anon/public key)
#
#    You only need to fill in the keys for providers you actually use.
#    Unused providers can be left empty — the app will ignore them.
#
#  After adding env vars:
#    Trigger a new deploy: Netlify Dashboard → Deploys → Trigger deploy
# ═══════════════════════════════════════════════════════════════

[build]
  publish = "."
  command = """
    echo "window.APP_CONFIG = {" > config.js
    echo "  provider: '${ZJ_PROVIDER:-groq}'," >> config.js
    echo "  groq:     { key: '${ZJ_GROQ_KEY}',     model: '${ZJ_GROQ_MODEL:-qwen/qwen3-32b}' }," >> config.js
    echo "  gemini:   { key: '${ZJ_GEMINI_KEY}',   model: '${ZJ_GEMINI_MODEL:-gemini-1.5-flash}' }," >> config.js
    echo "  openai:   { key: '${ZJ_OPENAI_KEY}',   model: '${ZJ_OPENAI_MODEL:-gpt-4o-mini}' }," >> config.js
    echo "  claude:   { key: '${ZJ_CLAUDE_KEY}',   model: '${ZJ_CLAUDE_MODEL:-claude-haiku-4-5-20251001}' }," >> config.js
    echo "  supabase: { url: '${ZJ_SUPABASE_URL}', anonKey: '${ZJ_SUPABASE_ANON_KEY}' }," >> config.js
    echo "};" >> config.js
    echo "Config file generated successfully."
    cat config.js
  """

# ── Security headers served with every response ──────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache: HTML — always revalidate (picks up new deploys) ───────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache: Service Worker — never cache (must always be fresh) ───
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache: config.js — never cache (contains keys, regenerated each deploy) ──
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"

# ── Cache: Static assets — long cache (sw.js cache-busts them) ──
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
